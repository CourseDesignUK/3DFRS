<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo-3D Fixed Lighting</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #status { position: absolute; top: 10px; left: 10px; color: #fff; z-index: 20; background: rgba(0,0,0,0.5); padding: 5px; }
        #video { position: absolute; bottom: 10px; right: 10px; width: 120px; transform: scaleX(-1); border-radius: 8px; opacity: 0.3; z-index: 10; }
    </style>
</head>
<body>
    <div id="status">Status: Initializing...</div>
    <video id="video" autoplay playsinline></video>
    
    <script type="module">
        import * as THREE from 'https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.module.min.js';
        import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.js";

        const video = document.getElementById("video");
        const status = document.getElementById("status");
        let scene, camera, renderer, faceLandmarker, model;
        let targetRotationY = 0;

        async function init() {
            // Scene & Camera
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x1a1a1a); // Dark gray background to see if canvas is alive
            renderer.toneMapping = THREE.ACESFilmicToneMapping; // Better lighting colors
            renderer.toneMappingExposure = 1.2;
            document.body.appendChild(renderer.domElement);

            // Lighting System
            const ambient = new THREE.AmbientLight(0xffffff, 1.0);
            scene.add(ambient);

            const sun = new THREE.DirectionalLight(0xffffff, 2.5);
            sun.position.set(5, 5, 5);
            scene.add(sun);

            // Environment Map (Fixes black metallic models)
            const pmremGenerator = new THREE.PMREMGenerator(renderer);
            scene.environment = pmremGenerator.fromScene(new THREE.Scene()).texture;

            // Load Model
            const loader = new GLTFLoader();
            loader.load('./models/box 2.glb', (gltf) => {
                model = gltf.scene;
                
                // Fix materials: remove extreme metalness and ensure visibility
                model.traverse((child) => {
                    if (child.isMesh) {
                        child.material.metalness = 0.2; // Reduce to avoid pitch black reflections
                        child.material.roughness = 0.5;
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });

                const box = new THREE.Box3().setFromObject(model);
                const size = box.getSize(new THREE.Vector3());
                const center = box.getCenter(new THREE.Vector3());
                const scale = 3.0 / Math.max(size.x, size.y, size.z);
                
                const wrapper = new THREE.Group();
                model.position.set(-center.x * scale, -center.y * scale, -center.z * scale);
                model.scale.setScalar(scale);
                wrapper.add(model);
                scene.add(wrapper);
                model = wrapper;

                status.textContent = "Status: Model Loaded";
            }, undefined, (e) => {
                status.textContent = "Error: model/box 2.glb not found. Use a local server.";
                console.error(e);
            });

            // AI Tracker
            try {
                const filesetResolver = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/models");
                faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
                    baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task` },
                    runningMode: "VIDEO"
                });

                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
            } catch (err) {
                status.textContent = "Status: No Camera (Manual Mode)";
            }

            window.addEventListener('keydown', (e) => {
                if (e.key.toLowerCase() === 'a') targetRotationY -= Math.PI / 2;
                if (e.key.toLowerCase() === 's') targetRotationY += Math.PI / 2;
            });

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);

            if (video.readyState === video.HAVE_ENOUGH_DATA && faceLandmarker) {
                const results = faceLandmarker.detectForVideo(video, performance.now());
                if (results.faceLandmarks?.[0]) {
                    const nose = results.faceLandmarks[0][1];
                    camera.position.x += ((0.5 - nose.x) * 4 - camera.position.x) * 0.1;
                    camera.position.y += ((0.5 - nose.y) * 4 - camera.position.y) * 0.1;
                    camera.lookAt(0, 0, 0);
                }
            }

            if (model) {
                model.rotation.y += (targetRotationY - model.rotation.y) * 0.1;
            }

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
