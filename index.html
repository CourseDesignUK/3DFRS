<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo-3D Model Viewer</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #video { 
            position: absolute; 
            bottom: 10px; 
            right: 10px; 
            width: 120px; 
            transform: scaleX(-1); 
            border-radius: 8px;
            opacity: 0.3;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <video id="video" autoplay playsinline></video>
    
    <script type="module">
        import * as THREE from 'https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.module.min.js';
        import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.js";

        const video = document.getElementById("video");
        let scene, camera, renderer, faceLandmarker, model;

        async function init() {
            // Scene Setup
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Lighting
            const ambient = new THREE.AmbientLight(0xffffff, 0.8);
            const spot = new THREE.SpotLight(0xffffff, 2);
            spot.position.set(5, 10, 5);
            scene.add(ambient, spot);

            // Load Model
            const loader = new GLTFLoader();
            loader.load('./models/box 2.glb', (gltf) => {
                model = gltf.scene;
                
                // Calculate scale to fit screen
                const box = new THREE.Box3().setFromObject(model);
                const size = box.getSize(new THREE.Vector3());
                const center = box.getCenter(new THREE.Vector3());
                
                const maxDim = Math.max(size.x, size.y, size.z);
                const fov = camera.fov * (Math.PI / 180);
                let cameraZ = Math.abs(maxDim / 2 / Math.tan(fov / 2));
                
                // Set scale and center
                const scale = 3.5 / maxDim; // Adjust constant for zoom preference
                model.scale.setScalar(scale);
                model.position.sub(center.multiplyScalar(scale));
                
                scene.add(model);
            });

            // MediaPipe Setup
            const filesetResolver = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/models");
            faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
                baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task` },
                runningMode: "VIDEO"
            });

            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            video.addEventListener("loadeddata", () => requestAnimationFrame(update));

            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function update() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                const results = faceLandmarker.detectForVideo(video, performance.now());
                
                if (results.faceLandmarks && results.faceLandmarks[0]) {
                    const nose = results.faceLandmarks[0][1]; // Nose tip landmark
                    
                    // Map nose coordinates to camera position (inverted X for mirror)
                    const targetX = (0.5 - nose.x) * 4;
                    const targetY = (0.5 - nose.y) * 4;

                    // Interpolation for smooth motion
                    camera.position.x += (targetX - camera.position.x) * 0.1;
                    camera.position.y += (targetY - camera.position.y) * 0.1;
                    camera.lookAt(0, 0, 0);

                    if (model) {
                        model.rotation.y = camera.position.x * 0.1;
                        model.rotation.x = -camera.position.y * 0.1;
                    }
                }
            }
            renderer.render(scene, camera);
            requestAnimationFrame(update);
        }

        init();
    </script>
</body>
</html>
